name: Keep HF Space Warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: hf-space-keepalive
  cancel-in-progress: true

jobs:
  ping-space:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Warm up and verify health
        run: |
          set -euo pipefail
          BASE_URL="https://saugata12-voicebot-api.hf.space"

          # A cold app may answer root sooner than /health.
          curl -sS -L --max-time 45 "$BASE_URL/" > /dev/null || true

          for i in 1 2 3 4; do
            code=$(curl -sS -L --max-time 45 -o /tmp/health.json -w "%{http_code}" "$BASE_URL/health" || echo 000)
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json || true
              exit 0
            fi
            sleep 20
          done

          echo "Health endpoint did not return 200 after retries"
          exit 1
