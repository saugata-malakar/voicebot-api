name: Keep HF Space Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          set -e
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://saugata12-voicebot-api.hf.space/health")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Health endpoint did not return 200"
          exit 1
